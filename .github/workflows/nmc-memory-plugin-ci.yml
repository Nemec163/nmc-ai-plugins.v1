name: nmc-memory-plugin CI

on:
  push:
    branches:
      - main
      - 'codex/**'
  pull_request:

jobs:
  baseline:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Run contract tests
        run: ./nmc-memory-plugin/tests/run-contract-tests.sh

      - name: Run integration tests
        run: ./nmc-memory-plugin/tests/run-integration.sh
